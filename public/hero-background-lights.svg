<svg width="1248" height="530" viewBox="0 0 1248 530" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Radial gradient for center glow -->
    <radialGradient id="center-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:rgba(183,164,251,0.15);stop-opacity:1" />
      <stop offset="50%" style="stop-color:rgba(183,164,251,0.05);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(183,164,251,0);stop-opacity:0" />
    </radialGradient>
    
    <!-- Linear gradient for vertical rays -->
    <linearGradient id="ray-1" x1="20%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
      <stop offset="30%" style="stop-color:rgba(255,255,255,0.08);stop-opacity:1" />
      <stop offset="70%" style="stop-color:rgba(255,255,255,0.08);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
    </linearGradient>
    
    <linearGradient id="ray-2" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
      <stop offset="20%" style="stop-color:rgba(255,255,255,0.12);stop-opacity:1" />
      <stop offset="80%" style="stop-color:rgba(255,255,255,0.12);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
    </linearGradient>
    
    <linearGradient id="ray-3" x1="80%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
      <stop offset="30%" style="stop-color:rgba(255,255,255,0.08);stop-opacity:1" />
      <stop offset="70%" style="stop-color:rgba(255,255,255,0.08);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:0" />
    </linearGradient>
  </defs>
  
  <!-- Center glow -->
  <rect width="1248" height="530" fill="url(#center-glow)"/>
  
  <!-- Vertical light rays -->
  <rect x="200" y="0" width="80" height="530" fill="url(#ray-1)" opacity="0.6"/>
  <rect x="584" y="0" width="80" height="530" fill="url(#ray-2)" opacity="0.8"/>
  <rect x="968" y="0" width="80" height="530" fill="url(#ray-3)" opacity="0.6"/>
</svg>
